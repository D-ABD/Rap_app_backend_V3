# Configuration pytest pour Rap App
# - Isolation : chaque test (TestCase/APITestCase) tourne dans une transaction ;
#   Django fait un ROLLBACK en fin de test (base propre sans nettoyage manuel).
# - Signaux de log : désactivés pendant pytest (logs_signals.skip_logging).
# - PostgreSQL : --reuse-db évite de recréer la base à chaque run et limite la
#   manipulation agressive des connexions/curseurs (réduit InvalidCursorName).
# Première exécution ou après changement de schéma : lancer une fois
#   pytest --create-db rap_app/tests/ -v -q  (puis les runs suivants peuvent garder --reuse-db).
# Debug (premier test qui déclenche une fermeture de curseur) :
#   pytest rap_app/tests/ -v --tb=long  ou  pytest rap_app/tests/ --pdb
# La config Django (DEBUG, etc.) n'est pas modifiée par pytest.

[pytest]
DJANGO_SETTINGS_MODULE = rap_app_project.settings
pythonpath = .
python_files = test_*.py tests_*.py
addopts = -v --tb=short --reuse-db
